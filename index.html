<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mandarin Dictation App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

    <div id="test-screen">
        <h2 id="term-week"></h2>
		<p id="sentence-structure" class="structure"></p>
        <button id="play-btn">Play Audio</button>
        <button id="answer-btn">Answer</button>
    </div>

    <div id="answer-screen" class="hidden">
        <h2 id="answer-term-week"></h2>
        <img id="answer-image" src="" alt="Answer Image">
        <p id="answer-english"></p>

        <div class="button-group">
            <button id="retry-btn">Try Again</button>
            <button id="new-btn">New Phrase</button>
        </div>
    </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
